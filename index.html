<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyConnect - 학생 학습 Q&A 커뮤니티</title>
  <meta name="description" content="학생들이 공부하다 궁금한 점을 질문하고 답변을 나누는 2단 구조 Q&A 커뮤니티 플랫폼입니다.">
  <!-- Google Fonts 프리로드 및 가져오기 (Inter & Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- CSS 스타일시트 연결 -->
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK (v9 compat) CDN 연결 (App, Firestore, Auth) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

  <!-- 메인 앱 컨테이너 (깔끔한 2단 레이아웃) -->
  <div id="app" class="app-layout">
    
    <!-- ========================================== -->
    <!-- 1단 (좌측): 과목 탐색, 태그 & 내 프로필 카드 -->
    <!-- ========================================== -->
    <aside class="sidebar-left" id="sidebarLeft">
      <!-- 서비스 로고 헤더 -->
      <div class="brand-header">
        <div class="logo-icon">📚</div>
        <div class="logo-text">
          <h1>StudyConnect</h1>
          <span class="badge-school">서연고등학교</span>
        </div>
      </div>

      <!-- 내 프로필 및 인증 컨트롤 카드 -->
      <div class="widget-card user-profile-card" style="margin-bottom: 24px;">
        <div class="profile-header">
          <div class="avatar" id="userAvatar">🎓</div>
          <div class="user-info">
            <h3 id="userName">로그인이 필요합니다</h3>
            <span class="user-id-tag" id="userIdTag">Guest User</span>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-item">
            <span class="stat-value" id="userQuestionCount">0</span>
            <span class="stat-label">내 질문</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-value" id="userAnswerCount">0</span>
            <span class="stat-label">내 답변</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-value" id="userAcceptedCount">0</span>
            <span class="stat-label">채택</span>
          </div>
        </div>
        <!-- 인증 버튼 구역 -->
        <div class="auth-btn-group" style="margin-top: 14px;">
          <button class="btn-auth-action" id="btnOpenAuth">🔑 로그인 / 회원가입</button>
          <button class="btn-auth-action btn-logout-action" id="btnLogout" style="display: none;">🚪 로그아웃</button>
        </div>
      </div>

      <!-- 과목 카테고리 필터 섹션 -->
      <div class="sidebar-section">
        <h2 class="section-title">과목별 탐색</h2>
        <ul class="category-list" id="categoryList">
          <li class="category-item active" data-subject="all">
            <span class="icon">✨</span> 전체보기
          </li>
          <li class="category-item" data-subject="수학">
            <span class="icon">📐</span> 수학
          </li>
          <li class="category-item" data-subject="영어">
            <span class="icon">🔤</span> 영어
          </li>
          <li class="category-item" data-subject="국어">
            <span class="icon">📖</span> 국어
          </li>
          <li class="category-item" data-subject="과학">
            <span class="icon">🧪</span> 과학
          </li>
          <li class="category-item" data-subject="사회">
            <span class="icon">🌍</span> 사회
          </li>
          <li class="category-item" data-subject="기타">
            <span class="icon">💡</span> 기타
          </li>
        </ul>
      </div>

      <!-- 인기 태그 필터 섹션 -->
      <div class="sidebar-section">
        <h2 class="section-title">인기 키워드 태그</h2>
        <div class="tag-cloud" id="tagCloud">
          <button class="tag-chip active" data-tag="all">#전체태그</button>
          <button class="tag-chip" data-tag="개념이해">#개념이해</button>
          <button class="tag-chip" data-tag="풀이과정">#풀이과정</button>
          <button class="tag-chip" data-tag="중간고사">#중간고사</button>
          <button class="tag-chip" data-tag="기출문제">#기출문제</button>
          <button class="tag-chip" data-tag="수능">#수능</button>
        </div>
      </div>
    </aside>

    <!-- ========================================== -->
    <!-- 2단 (중앙/메인): 질문 게시판 & 피드 -->
    <!-- ========================================== -->
    <main class="main-content" id="mainContent">
      <!-- 상단 검색 및 질문 작성 컨트롤 바 -->
      <header class="content-header">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="궁금한 내용을 검색해보세요... (예: 미분, 영단어)">
        </div>
        <button class="btn-primary" id="btnOpenNewQuestion">
          <span class="btn-icon">✏️</span> 질문 작성하기
        </button>
      </header>

      <!-- 현재 필터 상태 및 정렬 영역 -->
      <div class="feed-filter-bar">
        <div class="current-filter-info">
          <h2 id="currentFilterTitle">전체 질문 목록</h2>
          <span class="question-count" id="questionCount">0개의 질문</span>
        </div>
        <div class="sort-options">
          <button class="sort-btn active" data-sort="latest">최신순</button>
          <button class="sort-btn" data-sort="popular">도움돼요 많은순</button>
          <button class="sort-btn" data-sort="unanswered">답변 대기 중만</button>
        </div>
      </div>

      <!-- 질문 피드 카드 목록 리스트 -->
      <div class="question-feed" id="questionFeed">
        <!-- JS로 dynamic 렌더링 됩니다. -->
      </div>
    </main>

  </div>

  <!-- ========================================== -->
  <!-- 모달 레이어 0: 로그인 / 회원가입 인증 모달 -->
  <!-- ========================================== -->
  <div class="modal-overlay" id="authModal">
    <div class="modal-container" style="max-width: 440px;">
      <div class="modal-header">
        <h2 id="authModalTitle">🔐 스터디커넥트 로그인</h2>
        <button class="modal-close" id="btnCloseAuth">&times;</button>
      </div>
      <div class="modal-form">
        <!-- 구글 소셜 로그인 버튼 -->
        <button class="btn-google-login" id="btnGoogleAuth">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
          Google 계정으로 로그인
        </button>

        <div class="auth-divider">
          <span>또는 이메일로 시작</span>
        </div>

        <!-- 이메일 / 비번 로그인/가입 폼 -->
        <form id="emailAuthForm" style="display: flex; flex-direction: column; gap: 14px;">
          <div class="form-group" id="groupDisplayName" style="display: none;">
            <label for="inputDisplayName">학생 이름 (닉네임)</label>
            <input type="text" id="inputDisplayName" placeholder="예: 홍길동">
          </div>
          <div class="form-group">
            <label for="inputEmail">이메일 주소 <span class="required">*</span></label>
            <input type="email" id="inputEmail" placeholder="student@school.com" required>
          </div>
          <div class="form-group">
            <label for="inputPassword">비밀번호 <span class="required">*</span></label>
            <input type="password" id="inputPassword" placeholder="6자리 이상 입력" required>
          </div>

          <button type="submit" class="btn-primary" id="btnSubmitAuth" style="justify-content: center; width: 100%; margin-top: 6px;">
            로그인하기
          </button>
        </form>

        <div class="auth-toggle-msg" style="text-align: center; font-size: 13px; margin-top: 10px; color: var(--text-secondary);">
          <span id="authToggleText">아직 계정이 없으신가요?</span>
          <button type="button" id="btnToggleAuthMode" style="background:none; border:none; color:var(--accent-primary); font-weight:700; cursor:pointer; text-decoration:underline; margin-left:4px;">
            회원가입하기
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 모달 레이어 1: 새 질문 작성 모달 -->
  <!-- ========================================== -->
  <div class="modal-overlay" id="newQuestionModal">
    <div class="modal-container">
      <div class="modal-header">
        <h2>✏️ 새로운 질문 작성하기</h2>
        <button class="modal-close" id="btnCloseNewQuestion">&times;</button>
      </div>
      <form id="newQuestionForm" class="modal-form">
        <div class="form-group">
          <label for="inputSubject">과목 선택 <span class="required">*</span></label>
          <select id="inputSubject" required>
            <option value="수학">📐 수학</option>
            <option value="영어">🔤 영어</option>
            <option value="국어">📖 국어</option>
            <option value="과학">🧪 과학</option>
            <option value="사회">🌍 사회</option>
            <option value="기타">💡 기타</option>
          </select>
        </div>

        <div class="form-group">
          <label for="inputTitle">질문 제목 <span class="required">*</span></label>
          <input type="text" id="inputTitle" placeholder="궁금한 핵심 내용 한 줄 요약 (예: 이차함수 최대/최소 구하는 법)" required>
        </div>

        <div class="form-group">
          <label for="inputTags">태그 입력 (쉼표로 구분)</label>
          <input type="text" id="inputTags" placeholder="예: 개념이해, 기출문제, 중간고사">
        </div>

        <div class="form-group">
          <label for="inputContent">질문 상세 내용 <span class="required">*</span></label>
          <textarea id="inputContent" rows="6" placeholder="이해하기 어려웠던 부분을 구체적으로 작성해주세요. (문제집 몇 페이지인지, 어느 단계에서 막혔는지 등)" required></textarea>
        </div>

        <div class="form-notice" id="newQuestionAuthorNotice">
          ℹ️ 질문은 현재 로그인된 계정 명의로 저장됩니다.
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="btnCancelNewQuestion">취소</button>
          <button type="submit" class="btn-primary">질문 등록 완료</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 모달 레이어 2: 질문 상세 보기 & 답변 모달 -->
  <!-- ========================================== -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-container modal-large">
      <div class="modal-header">
        <div class="detail-subject-badge" id="detailSubject">과목</div>
        <button class="modal-close" id="btnCloseDetail">&times;</button>
      </div>
      
      <div class="modal-scroll-content" id="detailModalContent">
        <!-- JS로 상세 질문 및 답변 목록이 Dynamic으로 구성됩니다. -->
      </div>
    </div>
  </div>

  <!-- 메인 비즈니스 로직 스크립트 연결 -->
  <script src="app.js"></script>
</body>
</html>
